services:
  - type: web
    name: cocohaza
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: GOOGLE_MAPS_API_KEY
        sync: false           # Render ダッシュボードで設定
      - key: DISABLE_FLOOD_POLYGON
        value: "1"            # 無料プランは省メモリモードで起動
