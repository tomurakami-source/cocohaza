services:
  - type: web
    name: cocohaza
    runtime: python
    plan: standard        # 2GB RAM（ポリゴンデータに必要）
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /api/score?address=東京都千代田区
    envVars:
      - key: GOOGLE_MAPS_API_KEY
        sync: false       # Render ダッシュボードで手動設定
      - key: FLOOD_DATA_URL
        sync: false       # Cloudflare R2 の URL を設定
